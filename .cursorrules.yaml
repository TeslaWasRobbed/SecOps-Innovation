# Security Operations — Cursor AI Context

## Environment
- SIEM: Microsoft Sentinel
- Cloud platforms: AWS (primary), Azure
- Identity: Microsoft Entra ID
- EDR: Microsoft Defender for Endpoint
- E5 licence in use: Defender XDR, Purview, MDA all in scope

## Sentinel
- SDK: azure-mgmt-securityinsight, azure-monitor-query, azure-monitor-ingestion
- Auth: Always use DefaultAzureCredential
- Key log tables: SigninLogs, SecurityEvent, AWSCloudTrail, DeviceAlerts,
  OfficeActivity, AzureActivity, BehaviorAnalytics

## KQL Conventions
- Always include a time filter — default last 24 hours
- Use `has` over `contains` for performance
- Every rule must have: DisplayName, Description, Severity, Tactics, Techniques
- Severity values: High / Medium / Low / Informational only
- ATT&CK comment format: // Tactic: Initial Access | T1078 - Valid Accounts

## Python Conventions
- Python 3.12
- Use pip for package management
- azure-mgmt-securityinsight for Sentinel rule management
- azure-monitor-query for log queries
- DefaultAzureCredential for all Azure authentication
- boto3 for all AWS interactions
- All secrets via environment variables — never hardcoded
- pytest for all tests

## AWS Conventions
- Use boto3
- Key services in scope: GuardDuty, Security Hub, CloudTrail, Config, IAM

## ATT&CK
- Use mitreattack-python library for all MITRE data
- Always reference Enterprise ATT&CK matrix

## Project Structure
- Each tool lives in its own subdirectory
- Shared utilities go in /shared/
- All secrets in .env file, never committed to Git
- Output files go in each tool's /output/ directory