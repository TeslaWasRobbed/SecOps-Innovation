# Copy to company_profile.yaml and edit (optional). Used to tailor threat digest narrative
# and stakeholder HTML. Safe to commit a generic profile; keep secrets out of this file.

company_name: "Example Organisation"
sector: "Financial services" # e.g. healthcare, manufacturing, retail, technology
primary_regions:
  - "United Kingdom"
  - "European Union"

# What you actually run — the digest will relate headlines and KEVs to this stack where sensible
tools_and_platforms:
  - "Microsoft Sentinel"
  - "Microsoft Defender for Endpoint"
  - "Entra ID / Conditional Access"
  - "CrowdStrike Falcon"

cloud_environment: "Azure-first; limited AWS workloads"

# What leadership cares about most (used to prioritise wording in the summary)
priority_threats:
  - "Ransomware and extortion"
  - "Credential theft and phishing"
  - "Supply chain / third-party risk"

# One line on who reads this (tone and depth)
audience: "CISO and executive committee — minimal jargon; clear actions"

# Free text: acquisitions, major vendors, regulatory context, anything the model should weigh
additional_context: |
  We operate consumer-facing web properties; call out payment skimmers, e-commerce CMS issues,
  and OAuth / SaaS account takeover when relevant.

# Your organisation's real sending domains. Used by the Header Analysis tool (web workbench /
# `secops header`) to flag lookalike/typosquat domains in From, Reply-To, and Return-Path.
known_domains:
  - "example.com"
  - "example.co.uk"
